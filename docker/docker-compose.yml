version: "3.8"

networks:
  whalo-network:
    driver: bridge

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 22181:2181
    networks:
      - whalo-network

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    depends_on:
      - zookeeper
    ports:
      - 29092:29092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
    networks:
      - whalo-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - whalo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    networks:
      - whalo-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  player-svc:
    build:
      context: ../player-svc
      dockerfile: Dockerfile
    env_file:
      - ../player-svc/.env
    environment:
      - KAFKA_BROKERS=kafka:9092,kafka:9092,kafka:9092
      - MONGODB_URI=mongodb://mongo:27017/whalo_playerdb
    restart: always
    ports:
      - "4000:4000"
    expose:
      - "4000"
    networks:
      - whalo-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      zookeeper:
        condition: service_started
      mongo:
        condition: service_healthy

  gamescore-svc:
    build:
      context: ../gamescore-svc
      dockerfile: Dockerfile
    env_file:
      - ../gamescore-svc/.env
    environment:
      - KAFKA_BROKERS=kafka:9092,kafka:9092,kafka:9092
      - MONGODB_URI=mongodb://mongo:27017/whalo_playerdb
      - REDIS_URL=redis://redis:6379
    restart: always
    ports:
      - "4001:4001"
    expose:
      - "4001"
    networks:
      - whalo-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      zookeeper:
        condition: service_started
      mongo:
        condition: service_healthy
  leaderboard-svc:
    build:
      context: ../leaderboard-svc
      dockerfile: Dockerfile
    env_file:
      - ../leaderboard-svc/.env
    environment:
      - KAFKA_BROKERS=kafka:9092,kafka:9092,kafka:9092
      - MONGODB_URI=mongodb://mongo:27017/whalo_playerdb
      - REDIS_URL=redis://redis:6379
    restart: always
    ports:
      - "4002:4002"
    expose:
      - "4002"
    networks:
      - whalo-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      zookeeper:
        condition: service_started
      mongo:
        condition: service_healthy
  logs-svc:
    build:
      context: ../logs-svc
      dockerfile: Dockerfile
    env_file:
      - ../logs-svc/.env
    environment:
      - KAFKA_BROKERS=kafka:9092,kafka:9092,kafka:9092
      - MONGODB_URI=mongodb://mongo:27017/whalo_playerdb
      - REDIS_URL=redis://redis:6379
    restart: always
    ports:
      - "4003:4003"
    expose:
      - "4003"
    networks:
      - whalo-network
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      zookeeper:
        condition: service_started
      mongo:
        condition: service_healthy
